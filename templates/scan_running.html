{% extends 'base.html' %}
{% block title %}Scanning...{% endblock %}
{% block content %}
<div class="page">
  <div class="container container-sm">
    <div class="scan-running-card">
      <div class="scan-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-core">⬡</div>
      </div>
      <h2 class="scan-running-title">Scanning in progress</h2>
      <p class="scan-target">{{ scan.target }}</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <p class="progress-status" id="progressStatus">Starting scan...</p>
      <p class="scan-running-hint">This may take 1-3 minutes. You can safely leave this page.</p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const scanId = "{{ scan.scan_id }}";
const pollInterval = 2000;

function poll() {
  fetch(`/scan/${scanId}/progress`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('progressBar').style.width   = data.progress + '%';
      document.getElementById('progressStatus').textContent = data.status;
      if (data.done && data.redirect) {
        window.location.href = data.redirect;
      } else if (data.done && data.error) {
        document.getElementById('progressStatus').textContent = '❌ Scan failed. Please try again.';
      } else {
        setTimeout(poll, pollInterval);
      }
    })
    .catch(() => setTimeout(poll, pollInterval));
}

poll();
</script>
{% endblock %}
